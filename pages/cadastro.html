<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix Afiliados - Cadastro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E8590C' stroke-width='2'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" aria-label="Alternar tema">
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
    </button>

    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-mark" style="width: 48px; height: 48px; margin: 0 auto 16px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Fenix</h1>
                <p>Crie sua conta gratuita</p>
            </div>

            <!-- Register Card -->
            <div class="auth-card">
                <h2 class="auth-title">Cadastrar</h2>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="name">Nome completo</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Seu nome"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="seu@email.com"
                            data-validate="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="phone">Telefone</label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="(00) 00000-0000"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Mínimo 6 caracteres"
                            data-validate="password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmar senha</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="Repita a senha"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-animated">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        Criar Conta
                    </button>
                </form>

                <p class="auth-footer">
                    Já tem conta? <a href="../index.html">Entrar</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
