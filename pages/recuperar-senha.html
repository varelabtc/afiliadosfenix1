<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix Afiliados - Recuperar Senha</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E8590C' stroke-width='2'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" aria-label="Alternar tema">
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
    </button>

    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="logo-mark" style="width: 48px; height: 48px; margin: 0 auto 16px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Fenix</h1>
                <p>Recupere seu acesso</p>
            </div>

            <!-- Recover Card -->
            <div class="auth-card">
                <h2 class="auth-title">Recuperar Senha</h2>

                <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 24px;">
                    Digite seu e-mail cadastrado e enviaremos as instruções para redefinir sua senha.
                </p>

                <form id="recoverForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="seu@email.com"
                            data-validate="email"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-animated">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        Enviar Instruções
                    </button>
                </form>

                <p class="auth-footer">
                    Lembrou a senha? <a href="../index.html">Entrar</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('recoverForm').addEventListener('submit', function(e) {
            e.preventDefault();
            Toast.success('Instruções enviadas para seu e-mail!');
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 2000);
        });
    </script>
</body>
</html>
