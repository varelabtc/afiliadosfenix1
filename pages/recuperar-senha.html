<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix Afiliados - Recuperar Senha</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../img/fenix-logo.png">
</head>
<body>
    <!-- Theme Toggle -->
    <button class="theme-toggle" aria-label="Alternar tema">
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
    </button>

    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="auth-logo">
                    <img src="../img/fenix-logo.png" alt="Fenix Agency">
                </div>
                <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; color: var(--text-3); margin-top: 4px;">PLATAFORMA DE AFILIADOS</p>
                <p>Recupere seu acesso</p>
            </div>

            <!-- Recover Card -->
            <div class="auth-card">
                <h2 class="auth-title">Recuperar Senha</h2>

                <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 24px;">
                    Digite seu e-mail cadastrado e enviaremos as instruções para redefinir sua senha.
                </p>

                <form id="recoverForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="seu@email.com"
                            data-validate="email"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-animated">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        Enviar Instruções
                    </button>
                </form>

                <p class="auth-footer">
                    Lembrou a senha? <a href="../index.html">Entrar</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/supabase-db.js?v=4"></script>
    <script src="../js/main.js?v=4"></script>
    <script>
        document.getElementById('recoverForm').addEventListener('submit', function(e) {
            e.preventDefault();
            Toast.success('Instruções enviadas para seu e-mail!');
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 2000);
        });
    </script>

    <nav class="mobile-bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Inicio</span>
        </a>
        <a href="meus-links.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            <span>Links</span>
        </a>
        <a href="financeiro.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <span>Financeiro</span>
        </a>
        <a href="#" class="bottom-nav-item" id="moreMenuBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            <span>Mais</span>
        </a>
    </nav>
    <div class="more-menu" id="moreMenu">
        <a href="comissoes.html">Comissoes</a>
        <a href="materiais.html">Materiais</a>
        <a href="suporte.html">Suporte</a>
        <a href="perfil.html">Perfil</a>
        <a href="../index.html" onclick="Auth.logout()">Sair</a>
    </div>
    <script>
    (function(){
        var b=document.getElementById('moreMenuBtn');
        var m=document.getElementById('moreMenu');
        if(b&&m){
            b.addEventListener('click',function(e){e.preventDefault();m.classList.toggle('show');});
            document.addEventListener('click',function(e){if(!b.contains(e.target)&&!m.contains(e.target))m.classList.remove('show');});
        }
    })();
    </script>
</body>
</html>
