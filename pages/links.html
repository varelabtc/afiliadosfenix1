<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix Afiliados - Meus Links</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/png" href="../img/fenix-logo.png">
</head>
<body>
<div class="dashboard">
        <input type="checkbox" id="menu-toggle" class="menu-toggle-check">
        <div class="mobile-header">
            <label for="menu-toggle" class="mobile-menu-label">
                <span></span><span></span><span></span>
            </label>
            <span class="mobile-logo"><img src="../img/fenix-logo.png" alt="Fenix"> Fenix</span>
            <div style="width: 44px;"></div>
        </div>
        <label for="menu-toggle" class="sidebar-overlay-label"></label>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-mark">
                    <img src="../img/fenix-logo.png" alt="Fenix">
                </div>
                <h2>FENIX</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                        <polyline points="9,22 9,12 15,12 15,22"/>
                    </svg>
                    Dashboard
                </a>
                <a href="links.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
                        <line x1="7" y1="7" x2="7.01" y2="7"/>
                    </svg>
                    Ofertas
                </a>
                <a href="relatorios.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 20V10M12 20V4M6 20v-6"/>
                    </svg>
                    Relatórios
                </a>
                <a href="perfil.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Perfil
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                    <div class="user-details">
                        <h4 class="user-name">Usuário</h4>
                        <p class="user-email">email@exemplo.com</p>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="btn btn-secondary" style="width: 100%; margin-top: 12px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                    Sair
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Theme Toggle -->
            <button class="theme-toggle" style="position: absolute; top: 20px; right: 20px;">
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>

            <!-- Top Bar -->
            <div class="topbar">
                <div class="topbar-left">
                    <h1>Meus Links</h1>
                    <p>Gerencie seus links de afiliado</p>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary" onclick="Modal.open('createLinkModal')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        Criar Link
                    </button>
                </div>
            </div>

            <!-- Stats Summary -->
            <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon blue">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
                            </svg>
                        </div>
                    </div>
                    <div class="stat-value" id="totalLinksCount">0</div>
                    <div class="stat-label">Total de Links</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                                <polyline points="22,4 12,14.01 9,11.01"/>
                            </svg>
                        </div>
                    </div>
                    <div class="stat-value" id="activeLinksCount">0</div>
                    <div class="stat-label">Links Ativos</div>
                </div>

                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon orange">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                    </div>
                    <div class="stat-value" id="pendingLinksCount">0</div>
                    <div class="stat-label">Links Pendentes</div>
                </div>
            </div>

            <!-- Links List -->
            <div class="card">
                <div class="card-header">
                    <h3>Todos os Links</h3>
                    <div style="display: flex; gap: 12px;">
                        <select class="btn btn-secondary" style="padding: 10px 16px;" onchange="filterLinks(this.value)">
                            <option value="all">Todos</option>
                            <option value="active">Ativos</option>
                            <option value="pending">Pendentes</option>
                            <option value="inactive">Inativos</option>
                        </select>
                    </div>
                </div>
                <div class="card-body">
                    <div id="linksList" class="links-list">
                        <!-- Links serão carregados via JavaScript -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Link Modal -->
    <div class="modal-overlay" id="createLinkModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Criar Novo Link</h3>
                <button class="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="createLinkForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="linkName">Nome do Link</label>
                        <input
                            type="text"
                            id="linkName"
                            name="linkName"
                            placeholder="Ex: Curso de Marketing"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="originalUrl">URL Original</label>
                        <input
                            type="url"
                            id="originalUrl"
                            name="originalUrl"
                            placeholder="https://exemplo.com/produto"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="category">Categoria</label>
                        <select id="category" name="category">
                            <option value="cursos">Cursos</option>
                            <option value="ebooks">E-books</option>
                            <option value="software">Software</option>
                            <option value="servicos">Serviços</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-modal-close>Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar Link</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Update stats on page load
        document.addEventListener('DOMContentLoaded', function() {
            const links = Links.getAll();
            document.getElementById('totalLinksCount').textContent = links.length;
            document.getElementById('activeLinksCount').textContent = links.filter(l => l.status === 'active').length;
            document.getElementById('pendingLinksCount').textContent = links.filter(l => l.status === 'pending').length;
        });

        // Filter links
        function filterLinks(status) {
            const links = Links.getAll();
            const container = document.getElementById('linksList');

            const filteredLinks = status === 'all'
                ? links
                : links.filter(l => l.status === status);

            if (filteredLinks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Nenhum link encontrado com este filtro</p>
                    </div>
                `;
                return;
            }

            Pages.loadAllLinks();
        }

    </script>

    <nav class="mobile-bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span>Inicio</span>
        </a>
        <a href="meus-links.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            <span>Ofertas</span>
        </a>
        <a href="minha-equipe.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <span>Equipe</span>
        </a>
        <a href="financeiro.html" class="bottom-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            <span>Financeiro</span>
        </a>
        <a href="#" class="bottom-nav-item" id="moreMenuBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            <span>Mais</span>
        </a>
    </nav>
    <div class="more-menu" id="moreMenu">
        <a href="comissoes.html">Comissoes</a>
        <a href="minha-rede.html">Minha Rede</a>
        <a href="materiais.html">Materiais</a>
        <a href="suporte.html">Suporte</a>
        <a href="perfil.html">Perfil</a>
        <a href="../index.html" onclick="Auth.logout()">Sair</a>
    </div>
    <script>
    (function(){
        var b=document.getElementById('moreMenuBtn');
        var m=document.getElementById('moreMenu');
        if(b&&m){
            b.addEventListener('click',function(e){e.preventDefault();m.classList.toggle('show');});
            document.addEventListener('click',function(e){if(!b.contains(e.target)&&!m.contains(e.target))m.classList.remove('show');});
        }
    })();
    </script>
</body>
</html>
