<!DOCTYPE html>

<head>

        <!-- Sidebar Overlay -->

                <a href="minha-equipe.html" class="nav-item">

                    </svg>
                    Materiais

                <a href="suporte.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    Suporte
                </a>

                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Perfil
                </a>

                <div class="nav-divider"></div>

                <a href="../index.html" class="nav-item" onclick="Auth.logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>

                    </svg>

            </nav>

            <!-- Platform Selector -->
            <div class="platform-selector">
                <div class="platform-label">Plataforma</div>
                <div class="platform-buttons">
                    <button class="platform-btn active" data-platform="superbet" onclick="selectPlatform('superbet')">
                        <img src="../img/superbet-logo.png" alt="Superbet">
                    </button>
                    <button class="platform-btn" data-platform="sportingbet" onclick="selectPlatform('sportingbet')">
                        <img src="../img/sportingbet-logo.png" alt="Sportingbet">
                    </button>
                </div>
            </div>

            <!-- User Card -->
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar" id="userAvatar">F</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Carregando...</div>
                        <div class="user-role">Afiliado</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-content">
                <!-- Header -->
                <div class="page-header">
                    <h1>Meus Links</h1>
                    <p>Gerencie seus links de afiliado</p>
                </div>

                <!-- Link Card -->
                <div class="link-main-card">
                    <div class="link-main-header">
                        <div class="link-platform-info">
                            <div class="link-platform-logo" id="platformLogo"><img src="../img/superbet-logo.png" alt="Superbet"></div>
                            <div>
                                <span class="link-cpa">CPA: <strong id="platformCPA">R$ 35</strong></span>
                            </div>
                            <span id="platformName" style="display:none;">Superbet</span>
                        </div>
                        <span class="status-badge active">
                            <span class="status-dot"></span>
                            Ativo
                        </span>
                    </div>

                    <div class="link-url-box">
                        <span class="link-url" id="affiliateLink">https://superbet.com/register?ref=CODIGO</span>
                        <button class="btn-copy" onclick="copyLink()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                            Copiar
                        </button>
                    </div>

                    <div class="link-stats">
                        <div class="link-stat">
                            <span class="link-stat-value" id="linkClicks">0</span>
                            <span class="link-stat-label">Cliques</span>
                        </div>
                        <div class="link-stat">
                            <span class="link-stat-value" id="linkRegistros">0</span>
                            <span class="link-stat-label">Registros</span>
                        </div>
                        <div class="link-stat">
                            <span class="link-stat-value" id="linkFTDs">0</span>
                            <span class="link-stat-label">FTDs</span>
                        </div>
                        <div class="link-stat">
                            <span class="link-stat-value" id="linkEarnings">R$ 0</span>
                            <span class="link-stat-label">Ganhos</span>
                        </div>
                    </div>
                </div>

                <!-- Share -->
                <div class="card">
                    <div class="card-header">
                        <h3>Compartilhar</h3>
                    </div>
                    <div class="card-body">
                        <div class="share-buttons">
                            <button class="share-btn whatsapp" onclick="shareWhatsApp()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                                </svg>
                                WhatsApp
                            </button>
                            <button class="share-btn telegram" onclick="shareTelegram()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                                </svg>
                                Telegram
                            </button>
                            <button class="share-btn twitter" onclick="shareTwitter()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                </svg>
                                Twitter
                            </button>
                            <button class="share-btn facebook" onclick="shareFacebook()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                </svg>
                                Facebook
                            </button>
                        </div>
                    </div>
                </div>
            </div>

    <script src="../js/main.js"></script>
    <script>
        let currentPlatform = 'superbet';

        const platforms = {
            superbet: { name: 'Superbet', logo: '../img/superbet-logo.png', cpa: 35, color: '#E8590C', baseUrl: 'https://superbet.com/register?ref=' },
            sportingbet: { name: 'Sportingbet', logo: '../img/sportingbet-logo.png', cpa: 30, color: '#22C55E', baseUrl: 'https://sportingbet.com/register?ref=' }
        };

        document.addEventListener('DOMContentLoaded', function() {
            if (!Auth.requireAuth()) return;
            loadUserInfo();
            loadLinkData();
        });

        function loadUserInfo() {
            const user = Auth.currentUser;
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
            }
        }

        function loadLinkData() {
            const user = Auth.currentUser;
            const platform = platforms[currentPlatform];
            const affiliateCode = user?.affiliateCode || 'FENIX001';

            document.getElementById('platformLogo').innerHTML = `<img src="${platform.logo}" alt="${platform.name}">`;
            document.getElementById('platformName').textContent = platform.name;
            document.getElementById('platformCPA').textContent = Format.currency(platform.cpa);
            document.getElementById('affiliateLink').textContent = platform.baseUrl + affiliateCode;

            const links = Links.getAll().filter(l => l.platform === currentPlatform);
            const totalClicks = links.reduce((sum, l) => sum + (l.clicks || 0), 0);
            const totalConversions = links.reduce((sum, l) => sum + (l.conversions || 0), 0);
            const totalEarnings = links.reduce((sum, l) => sum + (l.earnings || 0), 0);

            document.getElementById('linkClicks').textContent = totalClicks;
            document.getElementById('linkRegistros').textContent = Math.floor(totalClicks / 10);
            document.getElementById('linkFTDs').textContent = totalConversions;
            document.getElementById('linkEarnings').textContent = Format.currency(totalEarnings);
        }

        function selectPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.platform === platform);
            });
            loadLinkData();
        }

        function copyLink() {
            const link = document.getElementById('affiliateLink').textContent;
            Clipboard.copy(link);
        }

        function shareWhatsApp() {
            const link = document.getElementById('affiliateLink').textContent;
            window.open(`https://wa.me/?text=${encodeURIComponent('Cadastre-se agora! ' + link)}`, '_blank');
        }

        function shareTelegram() {
            const link = document.getElementById('affiliateLink').textContent;
            window.open(`https://t.me/share/url?url=${encodeURIComponent(link)}`, '_blank');
        }

        function shareTwitter() {
            const link = document.getElementById('affiliateLink').textContent;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('Cadastre-se agora! ' + link)}`, '_blank');
        }

        function shareFacebook() {
            const link = document.getElementById('affiliateLink').textContent;
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(link)}`, '_blank');
        }

    </script>

    <style>
        .link-main-card {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
        }

        .link-main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .link-platform-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-platform-logo {
            width: 48px;
            height: 48px;
            background: #fff;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            padding: 4px;
        }

        .link-platform-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        .link-cpa {
            font-size: 0.8125rem;
            color: var(--text-3);
        }

        .link-cpa strong {
            color: var(--accent);
        }

        .link-url-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .link-url {
            flex: 1;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.8125rem;
            color: var(--accent);
            word-break: break-all;
        }

        .link-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .link-stat {
            text-align: center;
            padding: 16px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .link-stat-value {
            display: block;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 4px;
        }

        .link-stat-label {
            font-size: 0.6875rem;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        @media (max-width: 768px) {
            .link-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .link-url-box {
                flex-direction: column;
                align-items: stretch;
            }

            .link-url {
                text-align: center;
                margin-bottom: 10px;
            }

            .btn-copy {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</body>
</html>
