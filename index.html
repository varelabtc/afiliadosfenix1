<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E8590C' stroke-width='2'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1>Fenix</h1>
                <p>Plataforma de Afiliados</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>

            <div class="auth-footer">
                Não tem conta? <a href="pages/cadastro.html">Criar conta</a>
            </div>

            <div class="demo-info">
                <span class="demo-tag">Demo</span>
                <code>demo@fenix.com / 123456</code>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>

    <style>
        .demo-info {
            margin-top: 20px;
            padding: 12px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-align: center;
            position: relative;
        }

        .demo-tag {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            padding: 2px 10px;
            background: var(--accent);
            color: white;
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 999px;
        }

        .demo-info code {
            font-size: 0.8125rem;
            color: var(--text-2);
        }
    </style>
</body>
</html>
