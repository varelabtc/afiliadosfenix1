<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenix - Login</title>
    <link rel="icon" type="image/png" href="img/fenix-logo.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <img src="img/fenix-logo.png" alt="Fenix Agency">
                </div>
                <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; color: var(--text-3); margin-top: 4px;">PLATAFORMA DE AFILIADOS</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">E-MAIL</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">SENHA</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary">ENTRAR</button>
            </form>

            <div class="auth-footer">
                Não tem conta? <a href="pages/cadastro.html">Criar conta</a>
            </div>

        </div>
    </div>

    <script src="js/supabase-db.js?v=3"></script>
    <script src="js/main.js?v=3"></script>
</body>
</html>
